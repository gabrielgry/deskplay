- name: Install Bing Wallpaper extensions
  ansible.builtin.command: |
    busctl --user call org.gnome.Shell.Extensions /org/gnome/Shell/Extensions org.gnome.Shell.Extensions InstallRemoteExtension s {{ item }}
  with_items:
    - BingWallpaper@ineffable-gmail.com
  failed_when: false

- name: Ensure Vault's Bing Wallpaper folder exists 
  ansible.builtin.file:
    path: "{{ user.home }}/Vault/Archive/Wallpapers/Bing Wallpaper"
    state: directory
    owner: "{{ user.name }}"
    group: "{{ user.name }}"
    mode: "u=rwx,g=rx,o=rx"

- name: Set Bing Wallpaper folder
  community.general.dconf:
    key: "/org/gnome/shell/extensions/bingwallpaper/download-folder"
    value: "'{{ user.home }}/Vault/Archive/Wallpapers/Bing Wallpaper'" 
    state: present

- name: Set Bing Wallpaper market
  community.general.dconf:
    key: "/org/gnome/shell/extensions/bingwallpaper/market"
    value: "'pt-BR'" 
    state: present

- name: Set Bing Wallpaper market
  community.general.dconf:
    key: "/org/gnome/shell/extensions/bingwallpaper/resolution"
    value: "'UHD'"
    state: present

